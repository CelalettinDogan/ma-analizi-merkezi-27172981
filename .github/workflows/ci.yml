name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  test:
    name: Lint, typecheck & tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Lint
        run: bun run lint
        continue-on-error: true

      - name: Typecheck
        run: bunx tsc --noEmit

      - name: Run all unit tests
        run: bunx vitest run

  streak-e2e:
    name: Streak rewards E2E (must pass)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Streak rewards E2E scenarios
        run: bunx vitest run src/test/streak/streakRewards.test.ts --reporter=verbose
